<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 max-w-md mx-auto font-sans">

<h1 class="text-xl font-bold mb-4">➕ Thêm Deal</h1>

<input id="name" class="w-full p-3 border rounded mb-3" placeholder="Tên sản phẩm">
<input id="link" class="w-full p-3 border rounded mb-3" placeholder="Link Shopee">

<button onclick="add()" class="bg-green-500 text-white w-full py-3 rounded">
  Thêm ngay
</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyZVrHOFTU70YGbIgXpBJ_fVOeuoRCLojinUM4QmDogHSwTa0BVGHxW6JC2wZpAYuMS/exec";

async function add(){
  const name = document.getElementById("name").value.trim();
  const link = document.getElementById("link").value.trim();

  if(!name || !link){
    alert("Nhập đủ đi 😅");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ name, link })
  });

  alert("Đã thêm 😏");

  document.getElementById("name").value = "";
  document.getElementById("link").value = "";
}

</script>

</body>
</html>
